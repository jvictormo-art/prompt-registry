# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: "Gate de qualidade -- diagnóstico de causa-raiz (gerador Haiku, juiz Sonnet)"

# Pirâmide de avaliação combinada:
#   Camada 1 -- assertions determinísticas (gate barato: estrutura, latência, custo)
#   Camada 2 -- llm-rubric com juiz Sonnet (gate caro: 4 critérios 0-2, corte >= 6/8)
#
# Calibração de referência (incidente Cerebro 2026-05-13):
#   C1=2  C2=2  C3=2  C4=2  -> 8/8 para resposta completa
#   Gate em >= 6/8 (threshold 0.75); tolerância <= 1 ponto/critério.
#   Rubrica completa: prompt.rubric.md  |  Prompt do juiz: prompt.judge.xml

prompts:
  - file://prompt.md

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    label: claude-gerador
    config:
      temperature: 0
      max_tokens: 10000

defaultTest:
  options:
    provider: anthropic:messages:claude-sonnet-4-6   # JUIZ != GERADOR (anti self-preference)
    rubricPrompt: file://prompt.judge.xml
  assert:
    # ----- CAMADA 1 -- determinísticos -----

    # Seções obrigatórias do formato de saída do prompt
    - type: icontains
      value: "Resumo"
      metric: estrutura
    - type: icontains
      value: "Linha do tempo"
      metric: estrutura
    - type: icontains
      value: "Cadeia causal"
      metric: estrutura
    - type: icontains
      value: "Causa-raiz"
      metric: estrutura
    - type: icontains
      value: "Mitigação"
      metric: estrutura
    - type: icontains
      value: "Correção"
      metric: estrutura
    - type: icontains
      value: "Confiança"
      metric: estrutura

    # ----- CAMADA 2 -- qualidade subjetiva via juiz LLM -----

    # Aplica a rubrica de 4 critérios (0-2 cada, corte >= 6/8) via prompt.judge.xml.
    # `value` é descrição visível no Web UI; a rubrica real está no judge.xml.
    - type: llm-rubric
      value: "Aplicar a rubrica de 4 critérios (0-2 cada, corte >= 6/8) do prompt.judge.xml e retornar JSON estrito com pass/score/reason."
      threshold: 0.75
      metric: qualidade_juiz

tests:
  - description: "Incidente Cerebro -- reindexação prolongada saturando heap (2026-05-13)"
    vars:
      SISTEMA: |
        Cerebro -- cluster Elasticsearch gerenciado pela Aegis, motor de indexação e busca
        full-text usado pelo Sentinel e demais produtos da plataforma. Serviço Java/JVM
        com heap configurado em 8 GB.

      SINTOMA_REPORTADO: |
        A partir de ~08:30 UTC a busca no Cerebro degradou progressivamente.
        Às 10:00 UTC: latência p99 em 6700 ms (era 850 ms às 08:00), cache hit em 29%
        (era 74%). O plantão escalou o incidente após CircuitBreakingException aparecer
        nos logs.

      ARTEFATOS: |
        --- Artefato 1: Configuração ---
        Tipo: config
        Origem: cerebro.yaml (repositório de infra)

        cerebro:
          shards: 12
          replicas_per_shard: 1
          jvm_heap: 8g
          refresh_interval: 1s
          reindex_job:
            schedule: "0 2 * * *"     # roda todo dia às 02:00
            avg_duration_min: 90      # normalmente termina ~03:30
          query_cache:
            enabled: true
            size_mb: 512

        --- Artefato 2: Métricas ---
        Tipo: métricas
        Origem: dashboard Sentinel (pontos a cada 30 min)

